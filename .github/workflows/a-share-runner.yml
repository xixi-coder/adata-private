name: A股统一任务调度

on:
  schedule:
    - cron: "35 2 * * 1-5" # 北京时间工作日 10:35，盘中分时扫描
    - cron: "45 9 * * 1-5" # 北京时间工作日 17:45，盘后复盘组合
    - cron: "20 23 * * 0-4" # 北京时间工作日 07:20，共享缓存维护
  workflow_dispatch:
    inputs:
      profile:
        description: "运行 profile: intraday / intraday_pm / eod / maintenance / all"
        required: false
        default: "intraday"
      tasks:
        description: "可选，逗号分隔任务名，覆盖 profile"
        required: false
        default: ""
      trade_date:
        description: "指定交易日，可留空"
        required: false
        default: ""
      continue_on_error:
        description: "子任务失败后是否继续"
        required: false
        default: "false"

concurrency:
  group: a-share-runner-${{ github.event_name == 'schedule' && github.event.schedule || github.event.inputs.profile }}
  cancel-in-progress: false

jobs:
  run-a-share-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure directories
        run: |
          mkdir -p data/cache jobs/outputs

      - name: Resolve scheduled profile
        id: profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            profile="${{ github.event.inputs.profile }}"
            tasks="${{ github.event.inputs.tasks }}"
            trade_date="${{ github.event.inputs.trade_date }}"
            continue_on_error="${{ github.event.inputs.continue_on_error }}"
          else
            case "${{ github.event.schedule }}" in
              "35 2 * * 1-5")
                profile="intraday"
                ;;
              "45 9 * * 1-5")
                profile="eod"
                ;;
              "20 23 * * 0-4")
                profile="maintenance"
                ;;
              *)
                profile="intraday"
                ;;
            esac
            tasks=""
            trade_date=""
            continue_on_error="true"
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "tasks=$tasks" >> "$GITHUB_OUTPUT"
          echo "trade_date=$trade_date" >> "$GITHUB_OUTPUT"
          echo "continue_on_error=$continue_on_error" >> "$GITHUB_OUTPUT"

      - name: Run profile
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          A_SHARE_PORTFOLIO_JSON: ${{ secrets.A_SHARE_PORTFOLIO_JSON }}
          SMTP_HOST: smtp.163.com
          SMTP_PORT: "465"
          SMTP_USER: ${{ secrets.MAIL_163_USER }}
          SMTP_PASS: ${{ secrets.MAIL_163_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TRADE_DATE: ${{ steps.profile.outputs.trade_date }}
        run: |
          args=(--profile "${{ steps.profile.outputs.profile }}")
          if [ -n "${{ steps.profile.outputs.tasks }}" ]; then
            args+=(--tasks "${{ steps.profile.outputs.tasks }}")
          fi
          if [ -n "${{ steps.profile.outputs.trade_date }}" ]; then
            args+=(--trade-date "${{ steps.profile.outputs.trade_date }}")
          fi
          if [ "${{ steps.profile.outputs.continue_on_error }}" = "true" ]; then
            args+=(--continue-on-error)
          fi
          python jobs/a_share_runner.py "${args[@]}"

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a-share-runner-${{ steps.profile.outputs.profile }}-${{ github.run_number }}
          path: |
            jobs/outputs/latest_runner_summary.json
            jobs/short_term/outputs/latest_candidates.csv
            jobs/short_term/outputs/latest_signals.csv
            jobs/short_term/outputs/latest_summary.json
            jobs/short_term/outputs/latest_summary.txt
            jobs/volatility/outputs/latest_candidates.csv
            jobs/volatility/outputs/latest_summary.json
            jobs/volatility/outputs/latest_email_body.txt
            jobs/boll/outputs/latest_candidates.csv
            jobs/boll/outputs/latest_summary.json
            jobs/boll/outputs/latest_email_body.txt
            jobs/a_share_allocation/outputs/latest_email_body.txt
            jobs/a_share_allocation/outputs/latest_summary.json
            jobs/a_share_allocation/outputs/latest_top_candidates.csv
            jobs/a_share_allocation/outputs/latest_portfolio_review.csv
            jobs/three_dim_resonance/outputs/latest_summary.json
            jobs/three_dim_resonance/outputs/latest_email_body.txt
            data/cache/three_dim_cache_manifest.json
            data/cache/dividend/dividend_sync_manifest.json
          if-no-files-found: warn
          retention-days: 30
