name: A股每日投资复盘

on:
  schedule:
    - cron: "40 9 * * 1-5" # 北京时间周一到周五 17:40，脚本内会再次按A股交易日历过滤节假日
  workflow_dispatch:
    inputs:
      trade_date:
        description: "指定复盘日期，可留空"
        required: false
        default: ""
      allow_online_update:
        description: "是否在线更新日K缓存"
        required: false
        default: "true"

concurrency:
  group: a-share-daily-review
  cancel-in-progress: false

jobs:
  daily-review:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure cache and output directories exist
        run: |
          mkdir -p data/cache jobs/a_share_allocation/outputs

      - name: Run daily review
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          A_SHARE_PORTFOLIO_JSON: ${{ secrets.A_SHARE_PORTFOLIO_JSON }}
          TRADE_DATE: ${{ github.event.inputs.trade_date || '' }}
          A_SHARE_REVIEW_ALLOW_ONLINE_UPDATE: ${{ github.event.inputs.allow_online_update || 'true' }}
          A_SHARE_REVIEW_UNIVERSE_SIZE: "800"
          A_SHARE_REVIEW_MAX_POSITIONS: "18"
          A_SHARE_REVIEW_REBALANCE_PERIOD: "20"
          A_SHARE_REVIEW_INCLUDE_DIVIDEND: "true"
        run: |
          python jobs/a_share_allocation/run_daily.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a-share-daily-review-${{ github.run_number }}
          path: |
            jobs/a_share_allocation/outputs/latest_email_body.txt
            jobs/a_share_allocation/outputs/latest_summary.json
            jobs/a_share_allocation/outputs/latest_top_candidates.csv
            jobs/a_share_allocation/outputs/latest_top_candidates_raw.csv
            jobs/a_share_allocation/outputs/latest_portfolio_review.csv
            jobs/a_share_allocation/outputs/latest_metrics.csv
            jobs/a_share_allocation/outputs/latest_trades.csv
            jobs/a_share_allocation/outputs/latest_equity.csv
          if-no-files-found: warn
          retention-days: 30

      - name: Send email notification
        if: always()
        env:
          SMTP_HOST: smtp.163.com
          SMTP_PORT: "465"
          SMTP_USER: ${{ secrets.MAIL_163_USER }}
          SMTP_PASS: ${{ secrets.MAIL_163_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EMAIL_BODY_FILE: jobs/a_share_allocation/outputs/latest_email_body.txt
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage

          smtp_user = os.environ.get("SMTP_USER", "").strip()
          smtp_pass = os.environ.get("SMTP_PASS", "").strip()
          mail_to = os.environ.get("MAIL_TO", "").strip()
          if not smtp_user or not smtp_pass or not mail_to:
              print("未配置邮件 Secrets，跳过邮件通知。")
              raise SystemExit(0)

          body_file = os.environ["EMAIL_BODY_FILE"]
          if os.path.exists(body_file):
              with open(body_file, "r", encoding="utf-8") as f:
                  body = f.read().strip()
          else:
              body = "A股每日投资复盘未生成正文，请检查 GitHub Actions 日志。"

          status_map = {
              "success": "成功",
              "failure": "失败",
              "cancelled": "已取消",
          }
          status_zh = status_map.get(os.environ["JOB_STATUS"], os.environ["JOB_STATUS"])
          body = body + "\n\nAction: " + os.environ["RUN_URL"]

          msg = EmailMessage()
          msg["Subject"] = f"[{status_zh}] A股每日投资复盘"
          msg["From"] = smtp_user
          msg["To"] = mail_to
          msg.set_content(body)

          recipients = [item.strip() for item in mail_to.split(",") if item.strip()]
          with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"])) as server:
              server.login(smtp_user, smtp_pass)
              server.send_message(msg, to_addrs=recipients)
          PY
