name: A 股主线轮动 Workflow

on:
  schedule:
    - cron: "20 7 * * 1-5" # 北京时间工作日 15:20，收盘后生成主线轮动计划
  workflow_dispatch:
    inputs:
      positions_json:
        description: "可选，当前篮子仓位 JSON，例如 {\"科技成长\":0.2,\"创新药\":0.1}"
        required: false
        default: ""

concurrency:
  group: theme-rotation-workflow
  cancel-in-progress: false

jobs:
  theme-rotation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build fresh theme radar
        env:
          THEME_MONITOR_SEND_EMAIL_IN_SCRIPT: "false"
        run: |
          python jobs/theme_monitor/run.py

      - name: Prepare current positions
        id: positions
        shell: bash
        env:
          INPUT_POSITIONS_JSON: ${{ github.event.inputs.positions_json }}
          SECRET_POSITIONS_JSON: ${{ secrets.THEME_ROTATION_POSITIONS_JSON }}
        run: |
          positions_json="$INPUT_POSITIONS_JSON"
          if [ -z "$positions_json" ]; then
            positions_json="$SECRET_POSITIONS_JSON"
          fi
          if [ -n "$positions_json" ]; then
            printf '%s\n' "$positions_json" > /tmp/theme_rotation_positions.json
            python -m json.tool /tmp/theme_rotation_positions.json >/tmp/theme_rotation_positions.pretty.json
            mv /tmp/theme_rotation_positions.pretty.json /tmp/theme_rotation_positions.json
            echo "path=/tmp/theme_rotation_positions.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run theme rotation workflow
        shell: bash
        run: |
          args=()
          if [ -n "${{ steps.positions.outputs.path }}" ]; then
            args+=(--positions "${{ steps.positions.outputs.path }}")
          fi
          python jobs/theme_rotation_workflow/run.py "${args[@]}"

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theme-rotation-workflow-${{ github.run_number }}
          path: |
            jobs/theme_monitor/outputs/latest_theme_radar.csv
            jobs/theme_monitor/outputs/latest_market_context.json
            jobs/theme_rotation_workflow/outputs/latest_theme_rotation_plan.csv
            jobs/theme_rotation_workflow/outputs/latest_summary.json
            jobs/theme_rotation_workflow/outputs/latest_report.md
          if-no-files-found: warn
          retention-days: 30
