name: 初始化三维共振云端缓存

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "单次处理股票数，建议 200-600"
        required: false
        default: "300"
      shard_total:
        description: "分片总数，可留空"
        required: false
        default: ""
      shard_index:
        description: "分片索引，从 0 开始，可留空"
        required: false
        default: ""
      checkpoint_every:
        description: "每处理多少只股票落盘"
        required: false
        default: "100"
      finance_refresh_days:
        description: "财务缓存刷新天数"
        required: false
        default: "30"

concurrency:
  group: three-dim-resonance-cloud-data
  cancel-in-progress: false

jobs:
  build-cloud-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure cache directory exists
        run: |
          mkdir -p data/cache

      - name: Build and sync cloud cache
        env:
          CACHE_BATCH_SIZE: ${{ inputs.batch_size }}
          CACHE_SHARD_TOTAL: ${{ inputs.shard_total }}
          CACHE_SHARD_INDEX: ${{ inputs.shard_index }}
          CACHE_CHECKPOINT_EVERY: ${{ inputs.checkpoint_every }}
          FINANCE_REFRESH_DAYS: ${{ inputs.finance_refresh_days }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          python jobs/three_dim_resonance/init_cloud_cache.py

      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: three-dim-resonance-cache-manifest-${{ github.run_number }}
          path: data/cache/three_dim_cache_manifest.json
          if-no-files-found: warn
          retention-days: 14
