name: 初始化短线策略缓存

on:
  workflow_dispatch:

jobs:
  init-short-term-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache data
        uses: actions/cache@v4
        with:
          path: data/cache
          key: data-cache-${{ runner.os }}-${{ hashFiles('requirements.txt', 'strategies/short_term/short_term_strategy_code.py', 'tests/utils/all_code.csv') }}-${{ github.run_id }}
          restore-keys: |
            data-cache-${{ runner.os }}-${{ hashFiles('requirements.txt', 'strategies/short_term/short_term_strategy_code.py', 'tests/utils/all_code.csv') }}-
            data-cache-${{ runner.os }}-

      - name: Initialize strategy cache
        run: |
          python jobs/short_term/init_cache.py
