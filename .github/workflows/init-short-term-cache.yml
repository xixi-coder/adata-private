name: 初始化短线策略缓存

on:
  schedule:
    - cron: '20 23 * * 0-4'   # 北京时间工作日 07:20（UTC 周日到周四 23:20），给 10:20 分时扫描预留充足窗口
  workflow_dispatch:

concurrency:
  group: a-share-cloud-market-cache
  cancel-in-progress: false

jobs:
  init-short-term-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize strategy cache
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          python jobs/short_term/init_cache.py
