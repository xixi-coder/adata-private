name: Initialize Short-Term Cache

on:
  workflow_dispatch:

jobs:
  init-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CACHE_KEY_PREFIX: data-cache-${{ runner.os }}-${{ hashFiles('requirements.txt', 'tests/short_term_strategy_backtest_v1/short_term_strategy_code.py', 'tests/utils/all_code.csv') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install adata
          pip install -r requirements.txt

      - name: Restore data cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/cache
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-
            data-cache-${{ runner.os }}-

      - name: Initialize strategy cache
        run: |
          python tests/short_term_strategy_backtest_v1/init_short_term_cache.py

      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
