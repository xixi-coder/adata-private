name: 运行BOLL战法策略

on:
  schedule:
    - cron: '45 7 * * 1-5'   # 北京时间周一到周五 15:45，盘后扫描BOLL震荡信号
  workflow_dispatch:
    inputs:
      trade_date:
        description: "指定信号日期，可留空"
        required: false
        default: ""

concurrency:
  group: boll-daily-run
  cancel-in-progress: false

jobs:
  run-boll-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure cache directory exists
        run: |
          mkdir -p data/cache

      - name: Run BOLL strategy
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          TRADE_DATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.trade_date || '' }}
          BOLL_ENABLE_MINE_CLEARANCE: "true"
          BOLL_MAX_MINE_CHECKS: "120"
        run: |
          python jobs/boll/run_daily.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boll-daily-${{ github.run_number }}
          path: |
            jobs/boll/outputs/latest_candidates.csv
            jobs/boll/outputs/latest_summary.json
            jobs/boll/outputs/latest_email_body.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Send email notification
        if: always()
        env:
          SMTP_HOST: smtp.163.com
          SMTP_PORT: "465"
          SMTP_USER: ${{ secrets.MAIL_163_USER }}
          SMTP_PASS: ${{ secrets.MAIL_163_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          EMAIL_BODY_FILE: jobs/boll/outputs/latest_email_body.txt
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage

          smtp_user = os.environ.get("SMTP_USER", "").strip()
          smtp_pass = os.environ.get("SMTP_PASS", "").strip()
          mail_to = os.environ.get("MAIL_TO", "").strip()
          if not smtp_user or not smtp_pass or not mail_to:
              print("未配置邮件参数，跳过邮件通知。")
              raise SystemExit(0)

          body_file = os.environ["EMAIL_BODY_FILE"]
          if os.path.exists(body_file):
              with open(body_file, "r", encoding="utf-8") as f:
                  body = f.read().strip()
          else:
              body = "未生成BOLL战法策略正文。"

          msg = EmailMessage()
          msg["Subject"] = "BOLL战法策略扫描"
          msg["From"] = smtp_user
          msg["To"] = mail_to
          msg.set_content(body)

          recipients = [item.strip() for item in mail_to.split(",") if item.strip()]
          with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"])) as server:
              server.login(smtp_user, smtp_pass)
              server.send_message(msg, to_addrs=recipients)
          PY
