name: 运行短线分时策略-下午版

on:
  # 下午版作为盘中二次确认工具，默认不定时运行，避免和早盘信号重复刷屏。
  workflow_dispatch:      # 允许手动运行

concurrency:
  group: short-term-intraday-daily-run
  cancel-in-progress: false

jobs:
  run-short-term-intraday-afternoon:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure cache directory exists
        run: |
          mkdir -p data/cache

      - name: Run script
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          INTRADAY_SIGNAL_START_TIME: "09:30:00"
          INTRADAY_SIGNAL_END_TIME: "14:30:00"
        run: |
          python jobs/short_term/intraday_strategy_live.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intraday-live-pm-${{ github.run_number }}
          path: |
            jobs/short_term/outputs/latest_candidates.csv
            jobs/short_term/outputs/latest_signals.csv
            jobs/short_term/outputs/latest_summary.json
            jobs/short_term/outputs/latest_summary.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Send email notification
        if: always()
        env:
          SMTP_HOST: smtp.163.com
          SMTP_PORT: "465"
          SMTP_USER: ${{ secrets.MAIL_163_USER }}
          SMTP_PASS: ${{ secrets.MAIL_163_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTPUT_DIR: jobs/short_term/outputs
        run: |
          python - <<'PY'
          import csv
          import os
          import smtplib
          from email.message import EmailMessage

          smtp_user = os.environ.get("SMTP_USER", "").strip()
          smtp_pass = os.environ.get("SMTP_PASS", "").strip()
          mail_to = os.environ.get("MAIL_TO", "").strip()
          if not smtp_user or not smtp_pass or not mail_to:
              print("未配置邮件 Secrets，跳过邮件通知。")
              raise SystemExit(0)

          output_dir = os.environ["OUTPUT_DIR"]
          summary_txt = os.path.join(output_dir, "latest_summary.txt")
          summary_json = os.path.join(output_dir, "latest_summary.json")
          signal_csv = os.path.join(output_dir, "latest_signals.csv")

          status_map = {
              "success": "成功",
              "failure": "失败",
              "cancelled": "已取消",
          }
          status_zh = status_map.get(os.environ["JOB_STATUS"], os.environ["JOB_STATUS"])
          body_lines = ["短线策略扫描结果"]
          summary_map = {}
          if os.path.exists(summary_json):
              import json

              with open(summary_json, "r", encoding="utf-8") as f:
                  summary = json.load(f)
              summary_map = {
                  "候选依据日": str(summary.get("candidate_reference_date", "")),
                  "请求日期": str(summary.get("requested_trade_date", "")),
                  "扫描日期": str(summary.get("trade_date", "")),
                  "信号数量": str(summary.get("signal_count", "")),
                  "备注": str(summary.get("note", "")),
              }
          elif os.path.exists(summary_txt):
              with open(summary_txt, "r", encoding="utf-8") as f:
                  summary_text = f.read().strip()
              for line in summary_text.splitlines():
                  if "：" in line:
                      key, value = line.split("：", 1)
                  elif ":" in line:
                      key, value = line.split(":", 1)
                  else:
                      continue
                  summary_map[key.strip()] = value.strip()

          if summary_map:
              body_lines.append(f"候选依据日: {summary_map.get('候选依据日', '') or '无'}")
              body_lines.append(f"请求日期: {summary_map.get('请求日期', '') or '无'}")
              body_lines.append(f"扫描日期: {summary_map.get('扫描日期', '') or '无'}")
              body_lines.append(f"信号数量: {summary_map.get('信号数量', '') or '0'}")
              note = summary_map.get("备注", "")
              if note:
                  body_lines.append(f"备注: {note}")
          else:
              body_lines.append("未找到汇总文件。")

          if os.path.exists(signal_csv):
              with open(signal_csv, "r", encoding="utf-8-sig") as f:
                  rows = list(csv.DictReader(f))
              if rows:
                  body_lines.extend(["", "分时信号:"])
                  for idx, row in enumerate(rows[:10], start=1):
                      body_lines.append(
                          f"{idx}. {row.get('股票代码', '')} {row.get('股票简称', '')} "
                          f"{row.get('信号时间', '')} 价格={row.get('信号价格', '')} "
                          f"涨幅={row.get('当时涨幅(%)', '')}% 分数={row.get('日线候选分', '')}"
                      )
                  if len(rows) > 10:
                      body_lines.append(f"... 共 {len(rows)} 条信号，仅展示前 10 条")
              else:
                  body_lines.extend(["", "分时信号: 无"])
          else:
              body_lines.extend(["", "分时信号文件未生成。"])

          msg = EmailMessage()
          msg["Subject"] = f"[{status_zh}] 短线策略信号-下午版"
          msg["From"] = smtp_user
          msg["To"] = mail_to
          msg.set_content("\n".join(body_lines))

          recipients = [item.strip() for item in mail_to.split(",") if item.strip()]
          with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"])) as server:
              server.login(smtp_user, smtp_pass)
              server.send_message(msg, to_addrs=recipients)
          PY
